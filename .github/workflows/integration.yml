name: Integration Tests

on:
  push:
    branches: [main]

jobs:
  integration-test:
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ secrets.STAGING_API_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env from staging
        run: |
          echo "API_BASE_URL=${{ secrets.STAGING_API_URL }}" > .env

      - name: Start Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          script: flutter test integration_test/ --dart-define=API_BASE_URL=${{ secrets.STAGING_API_URL }}
