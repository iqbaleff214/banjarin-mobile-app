  /admin/ai/enrich/{word_id}:
    parameters:
      - name: word_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Admin — AI]
      summary: Trigger definition enrichment job for a word
      description: |
        Creates an `AIRequest` of type `enrich_definition`. The job runs
        asynchronously. Poll `GET /admin/ai/requests/{id}` for the result.
      security:
        - BearerAuth: []
      responses:
        '202':
          description: Enrichment job queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/AIRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

