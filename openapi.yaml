openapi: 3.1.1
info:
  title: Kamus Banjar API
  version: 2.0.0
  description: |
    REST API for the Banjar language dictionary (Dialek Hulu). Community-driven
    platform with user contributions, AI-assisted translation and enrichment via
    OpenRouter, and admin moderation tooling.

    **Data source:** Kamus Bahasa Banjar Dialek Hulu-Indonesia, Edisi Pertama
    (Balai Bahasa Banjarmasin, Departemen Pendidikan Nasional, 2008; ISBN 978-979-685-776-0)

    ## Authentication
    Most write operations and all AI features require a Bearer JWT.
    Obtain a token via `POST /auth/login` and pass it as:
    ```
    Authorization: Bearer <access_token>
    ```

    ## Error format
    All errors follow a consistent envelope:
    ```json
    { "success": false, "error": { "code": "...", "message": "..." } }
    ```
  contact:
    name: Kamus Banjar Open Source
  license:
    name: MIT

servers:
  - url: /api/v2
    description: Current version

tags:
  - name: Dictionary
    description: Browse and search word entries
  - name: Contributions
    description: Community contribution workflow
  - name: Votes
    description: Upvote / downvote words and definitions
  - name: Bookmarks
    description: Personal word bookmarks
  - name: Comments
    description: Community comments on words
  - name: AI
    description: AI-powered translation (authenticated users)
  - name: Auth
    description: Registration, login, token management
  - name: Admin — Words
    description: Direct word management (admin)
  - name: Admin — Users
    description: User management (admin)
  - name: Admin — Moderation
    description: Contribution and comment moderation queue (admin)
  - name: Admin — AI
    description: AI enrichment jobs and review (admin)

# ---------------------------------------------------------------------------
# Security schemes
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ---------------------------------------------------------------------------
  # Reusable parameters
  # ---------------------------------------------------------------------------
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    WordId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DefinitionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ContributionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CommentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AIRequestId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # ---------------------------------------------------------------------------
  # Reusable schemas
  # ---------------------------------------------------------------------------
  schemas:

    # --- Enums ---

    WordClass:
      type: string
      enum: [n, v, a, adv, p, pb, ki]
      description: |
        Word class abbreviation (from source dictionary section 2.1):
        - `n` nomina (noun)
        - `v` verba (verb)
        - `a` adjektiva (adjective)
        - `adv` adverbia (adverb)
        - `p` partikel (particle/interjection)
        - `pb` pribahasa (proverb)
        - `ki` kiasan (figurative/idiomatic)

    Dialect:
      type: string
      enum: [hulu]
      description: Banjar dialect. Only `hulu` is in scope for v2.

    Source:
      type: string
      enum: [seeded, contributed, ai_generated]

    ContributionType:
      type: string
      enum: [new_word, new_definition, new_example, edit_word]

    ContributionStatus:
      type: string
      enum: [pending, approved, rejected, withdrawn]

    AIRequestType:
      type: string
      enum: [enrich_definition, suggest_example, suggest_related, quality_check]

    AIRequestStatus:
      type: string
      enum: [pending, completed, failed]

    AIReviewStatus:
      type: string
      enum: [unreviewed, approved, rejected]

    SortWords:
      type: string
      enum: [alphabetical, most_voted, recently_added]
      default: alphabetical

    UserRole:
      type: string
      enum: [user, admin]

    # --- Shared value objects ---

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
          example: 500

    ErrorBody:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - UNAUTHORIZED
                - FORBIDDEN
                - NOT_FOUND
                - CONFLICT
                - RATE_LIMITED
                - AI_UNAVAILABLE
                - INTERNAL_ERROR
              example: VALIDATION_ERROR
            message:
              type: string
              example: The given data was invalid.
            details:
              type: object
              additionalProperties: true

    # --- Dictionary ---

    Definition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        meaning:
          type: string
          example: ayah
        sort_order:
          type: integer
          example: 1
        source:
          $ref: '#/components/schemas/Source'
        upvotes:
          type: integer
          example: 12
        downvotes:
          type: integer
          example: 1

    Example:
      type: object
      properties:
        id:
          type: string
          format: uuid
        banjar_sentence:
          type: string
          example: abah inya kada
        indonesian_translation:
          type: string
          example: dia tidak berayah
        source:
          $ref: '#/components/schemas/Source'

    Word:
      type: object
      properties:
        id:
          type: string
          format: uuid
        banjar:
          type: string
          example: abah
        banjar_syllabified:
          type: string
          nullable: true
          example: a.bah
        dialect:
          $ref: '#/components/schemas/Dialect'
        word_class:
          $ref: '#/components/schemas/WordClass'
        homonym_number:
          type: integer
          minimum: 1
          example: 1
        is_root:
          type: boolean
          example: true
        root_word_id:
          type: string
          format: uuid
          nullable: true
        definitions:
          type: array
          items:
            $ref: '#/components/schemas/Definition'
        examples:
          type: array
          items:
            $ref: '#/components/schemas/Example'
        related_words:
          type: array
          items:
            type: string
            format: uuid
        status:
          type: string
          enum: [active, deprecated]
        source:
          $ref: '#/components/schemas/Source'
        source_reference:
          type: string
          nullable: true
          example: "Kamus Bahasa Banjar Dialek Hulu-Indonesia, Edisi Pertama (Balai Bahasa Banjarmasin, 2008)"
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WordSummary:
      type: object
      description: Lightweight word representation for list responses
      properties:
        id:
          type: string
          format: uuid
        banjar:
          type: string
          example: abah
        dialect:
          $ref: '#/components/schemas/Dialect'
        word_class:
          $ref: '#/components/schemas/WordClass'
        homonym_number:
          type: integer
          example: 1
        is_root:
          type: boolean
        primary_meaning:
          type: string
          description: First definition meaning for quick display
          example: ayah
        source:
          $ref: '#/components/schemas/Source'
        created_at:
          type: string
          format: date-time

    WordInput:
      type: object
      required: [banjar, word_class]
      properties:
        banjar:
          type: string
          minLength: 1
          maxLength: 100
          example: abah
        banjar_syllabified:
          type: string
          nullable: true
          example: a.bah
        word_class:
          $ref: '#/components/schemas/WordClass'
        homonym_number:
          type: integer
          minimum: 1
          default: 1
        is_root:
          type: boolean
          default: true
        root_word_id:
          type: string
          format: uuid
          nullable: true
        definitions:
          type: array
          minItems: 1
          items:
            type: object
            required: [meaning]
            properties:
              meaning:
                type: string
                maxLength: 2000
              sort_order:
                type: integer
                minimum: 1
        examples:
          type: array
          items:
            type: object
            required: [banjar_sentence, indonesian_translation]
            properties:
              banjar_sentence:
                type: string
              indonesian_translation:
                type: string

    # --- Contribution ---

    ContributionPayloadNewWord:
      type: object
      required: [banjar, word_class, definitions]
      properties:
        banjar:
          type: string
          example: kambang
        banjar_syllabified:
          type: string
          nullable: true
        word_class:
          $ref: '#/components/schemas/WordClass'
        definitions:
          type: array
          minItems: 1
          items:
            type: object
            required: [meaning]
            properties:
              meaning:
                type: string
                maxLength: 2000
        examples:
          type: array
          items:
            type: object
            properties:
              banjar_sentence:
                type: string
              indonesian_translation:
                type: string

    ContributionPayloadNewDefinition:
      type: object
      required: [meaning]
      properties:
        meaning:
          type: string
          maxLength: 2000
          example: bunga; kembang

    ContributionPayloadNewExample:
      type: object
      required: [banjar_sentence, indonesian_translation]
      properties:
        banjar_sentence:
          type: string
        indonesian_translation:
          type: string

    ContributionPayloadEditWord:
      type: object
      properties:
        banjar:
          type: string
        banjar_syllabified:
          type: string
          nullable: true
        word_class:
          $ref: '#/components/schemas/WordClass'

    Contribution:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/ContributionType'
        contributor_id:
          type: string
          format: uuid
        target_word_id:
          type: string
          format: uuid
          nullable: true
        payload:
          type: object
          additionalProperties: true
          description: Content varies by contribution type
        status:
          $ref: '#/components/schemas/ContributionStatus'
        reviewer_id:
          type: string
          format: uuid
          nullable: true
        reviewer_note:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
        reviewed_at:
          type: string
          format: date-time
          nullable: true

    # --- Community ---

    Vote:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        target_type:
          type: string
          enum: [word, definition]
        target_id:
          type: string
          format: uuid
        value:
          type: string
          enum: [up, down]
        created_at:
          type: string
          format: date-time

    Bookmark:
      type: object
      properties:
        id:
          type: string
          format: uuid
        word_id:
          type: string
          format: uuid
        word:
          $ref: '#/components/schemas/WordSummary'
        created_at:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        target_type:
          type: string
          enum: [word, contribution]
        target_id:
          type: string
          format: uuid
        body:
          type: string
          maxLength: 1000
        is_flagged:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # --- Identity ---

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Ahmad Fauzi
        email:
          type: string
          format: email
          example: ahmad@example.com
        role:
          $ref: '#/components/schemas/UserRole'
        is_active:
          type: boolean
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refresh_token:
          type: string
          example: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4...
        expires_in:
          type: integer
          description: Access token TTL in seconds
          example: 900

    # --- AI ---

    TranslationResult:
      type: object
      properties:
        original:
          type: string
          example: inya kada kawa tulak ka pasar
        translation:
          type: string
          example: dia tidak bisa pergi ke pasar
        dialect:
          $ref: '#/components/schemas/Dialect'
        model:
          type: string
          example: mistralai/mistral-7b-instruct:free
        confidence:
          type: string
          enum: [high, medium, low]
        notes:
          type: string
          nullable: true
          example: "Uses BBDH vocabulary: kada=tidak, kawa=bisa, tulak=pergi"

    AIRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/AIRequestType'
        target_word_id:
          type: string
          format: uuid
          nullable: true
        target_contribution_id:
          type: string
          format: uuid
          nullable: true
        requested_by:
          type: string
          format: uuid
        model:
          type: string
          example: mistralai/mistral-7b-instruct:free
        prompt:
          type: string
        response:
          type: object
          nullable: true
          additionalProperties: true
          description: Raw OpenRouter response
        parsed_output:
          type: object
          nullable: true
          additionalProperties: true
          description: Structured extraction from response
        status:
          $ref: '#/components/schemas/AIRequestStatus'
        review_status:
          $ref: '#/components/schemas/AIReviewStatus'
        reviewed_by:
          type: string
          format: uuid
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    # --- Moderation ---

    ModerationStats:
      type: object
      properties:
        pending_contributions:
          type: integer
        flagged_comments:
          type: integer
        approved_this_week:
          type: integer
        rejected_this_week:
          type: integer

  # ---------------------------------------------------------------------------
  # Reusable responses
  # ---------------------------------------------------------------------------
  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Authentication required.

    Forbidden:
      description: Insufficient role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
          example:
            success: false
            error:
              code: FORBIDDEN
              message: You do not have permission to perform this action.

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
          example:
            success: false
            error:
              code: NOT_FOUND
              message: The requested resource was not found.

    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: The given data was invalid.
              details:
                banjar: ["The banjar field is required."]

    Conflict:
      description: Duplicate resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
          example:
            success: false
            error:
              code: CONFLICT
              message: Resource already exists.

    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
          example:
            success: false
            error:
              code: RATE_LIMITED
              message: Too many requests. Please slow down.

    AIUnavailable:
      description: OpenRouter unreachable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
          example:
            success: false
            error:
              code: AI_UNAVAILABLE
              message: AI service is temporarily unavailable.

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ==========================================================================
  # Dictionary
  # ==========================================================================

  /words:
    get:
      tags: [Dictionary]
      summary: List / search words
      description: |
        Returns a paginated list of active root words.
        Supports full-text search on `banjar` and Indonesian meaning fields.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: q
          in: query
          description: Full-text search query
          schema:
            type: string
            example: abah
        - name: word_class
          in: query
          description: Filter by word class
          schema:
            $ref: '#/components/schemas/WordClass'
        - name: is_root
          in: query
          schema:
            type: boolean
        - name: source
          in: query
          schema:
            $ref: '#/components/schemas/Source'
        - name: sort
          in: query
          schema:
            $ref: '#/components/schemas/SortWords'
      responses:
        '200':
          description: Paginated list of words
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WordSummary'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '429':
          $ref: '#/components/responses/RateLimited'

  /words/search:
    get:
      tags: [Dictionary]
      summary: Full-text search (alias)
      description: Alias for `GET /words?q=`. Retained for discoverability.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: sort
          in: query
          schema:
            $ref: '#/components/schemas/SortWords'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WordSummary'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '429':
          $ref: '#/components/responses/RateLimited'

  /words/{id}:
    parameters:
      - $ref: '#/components/parameters/WordId'
    get:
      tags: [Dictionary]
      summary: Get word detail
      responses:
        '200':
          description: Word with definitions and examples
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/Word'
        '404':
          $ref: '#/components/responses/NotFound'

  /words/{id}/definitions:
    parameters:
      - $ref: '#/components/parameters/WordId'
    get:
      tags: [Dictionary]
      summary: List definitions for a word
      description: Returns definitions sorted by net vote score (upvotes − downvotes) descending.
      responses:
        '200':
          description: Definitions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Definition'
        '404':
          $ref: '#/components/responses/NotFound'

  /words/{id}/examples:
    parameters:
      - $ref: '#/components/parameters/WordId'
    get:
      tags: [Dictionary]
      summary: List example sentences for a word
      responses:
        '200':
          description: Examples
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Example'
        '404':
          $ref: '#/components/responses/NotFound'

  /words/{id}/related:
    parameters:
      - $ref: '#/components/parameters/WordId'
    get:
      tags: [Dictionary]
      summary: Get related words
      responses:
        '200':
          description: Related words (summary)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WordSummary'
        '404':
          $ref: '#/components/responses/NotFound'

  /words/{id}/comments:
    parameters:
      - $ref: '#/components/parameters/WordId'
    get:
      tags: [Comments]
      summary: List comments on a word
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Paginated comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Comments]
      summary: Post a comment on a word
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
                  minLength: 1
                  maxLength: 1000
                  example: Kata ini juga dipakai di Hulu Sungai Utara.
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/Comment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /words/{id}/votes:
    parameters:
      - $ref: '#/components/parameters/WordId'
    post:
      tags: [Votes]
      summary: Cast a vote on a word
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: string
                  enum: [up, down]
      responses:
        '201':
          description: Vote cast (or updated if changing direction)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/Vote'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Votes]
      summary: Remove vote from a word
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Vote removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==========================================================================
  # Definitions (standalone routes for voting)
  # ==========================================================================

  /definitions/{id}/votes:
    parameters:
      - $ref: '#/components/parameters/DefinitionId'
    post:
      tags: [Votes]
      summary: Cast a vote on a definition
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: string
