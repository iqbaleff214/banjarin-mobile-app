  # ==========================================================================
  # Contributions
  # ==========================================================================

  /contributions:
    get:
      tags: [Contributions]
      summary: List contributions
      description: |
        Users see their own contributions. Admins see all contributions.
        Filter by `status` to narrow results.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ContributionStatus'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/ContributionType'
      responses:
        '200':
          description: Paginated contributions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contribution'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Contributions]
      summary: Submit a contribution
      description: |
        Submit a new word, definition, example, or word edit for admin review.

        Payload shape depends on `type`:
        - `new_word` → `ContributionPayloadNewWord`
        - `new_definition` → `ContributionPayloadNewDefinition` (requires `target_word_id`)
        - `new_example` → `ContributionPayloadNewExample` (requires `target_word_id`)
        - `edit_word` → `ContributionPayloadEditWord` (requires `target_word_id`)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, payload]
              properties:
                type:
                  $ref: '#/components/schemas/ContributionType'
                target_word_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Required for all types except `new_word`
                payload:
                  type: object
                  additionalProperties: true
                  description: Content depends on `type`
            examples:
              new_word:
                summary: Submit a new word
                value:
                  type: new_word
                  payload:
                    banjar: kambang
                    word_class: n
                    definitions:
                      - meaning: bunga; kembang
              new_definition:
                summary: Add a definition to existing word
                value:
                  type: new_definition
                  target_word_id: 018e1a3b-1234-7000-8000-abcdef012345
                  payload:
                    meaning: perempuan cantik (kiasan)
      responses:
        '201':
          description: Contribution submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/Contribution'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

  /contributions/{id}:
    parameters:
      - $ref: '#/components/parameters/ContributionId'
    get:
      tags: [Contributions]
      summary: Get contribution detail
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Contribution detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/Contribution'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /contributions/{id}/withdraw:
    parameters:
      - $ref: '#/components/parameters/ContributionId'
    patch:
      tags: [Contributions]
      summary: Withdraw a pending contribution
      description: Can only be called by the contributor while status is `pending`.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Contribution withdrawn
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/Contribution'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /contributions/{id}/approve:
    parameters:
      - $ref: '#/components/parameters/ContributionId'
    patch:
      tags: [Contributions]
      summary: Approve a contribution (admin)
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
