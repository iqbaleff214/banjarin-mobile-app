name: banjarin
description: "Kamus Bahasa Banjar Dialek Hulu — community-driven mobile dictionary."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Functional programming (Either monad)
  fpdart: ^1.1.0

  # HTTP client
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Local cache
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.6.1

  # Environment config
  flutter_dotenv: ^5.2.1

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # Dependency injection
  get_it: ^7.7.0

  # Stream utilities (debounce for SearchBloc)
  stream_transform: ^2.1.0

  # Connectivity checking (offline detection)
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
  assets:
    - .env
